name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed / json_serializable)
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
